<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AUGUR // LEARNING LEDGER</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --magenta: #ff0066;
    --bg: #0a0008;
    --white-dim: rgba(255,255,255,0.5);
    --white-faint: rgba(255,255,255,0.4);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: #fff;
    font-family: 'Share Tech Mono', monospace;
    overflow-x: hidden;
    min-height: 100vh;
  }

  /* Scanlines */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.15) 2px,
      rgba(0,0,0,0.15) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* Header */
  .header {
    padding: 30px 40px 20px;
    border-bottom: 1px solid rgba(255,0,102,0.2);
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .header-left { display: flex; align-items: baseline; gap: 16px; }
  .logo {
    font-family: 'VT323', monospace;
    font-size: 36px;
    color: var(--magenta);
    text-shadow: 0 0 20px rgba(255,0,102,0.5), 3px 0 0 rgba(255,0,102,0.15), -2px 0 0 rgba(0,255,255,0.08);
    letter-spacing: 6px;
  }
  .subtitle {
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    letter-spacing: 6px;
    color: var(--white-faint);
    text-transform: uppercase;
  }
  .back-link {
    font-family: 'VT323', monospace;
    font-size: 18px;
    color: var(--magenta);
    text-decoration: none;
    letter-spacing: 2px;
    opacity: 0.7;
    transition: opacity 0.2s;
  }
  .back-link:hover { opacity: 1; text-shadow: 0 0 10px rgba(255,0,102,0.5); }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 30px;
    padding: 16px 40px;
    border-bottom: 1px solid rgba(255,0,102,0.08);
    flex-wrap: wrap;
  }
  .stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .stat-label {
    font-family: 'Rajdhani', sans-serif;
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--white-faint);
    text-transform: uppercase;
  }
  .stat-value {
    font-family: 'VT323', monospace;
    font-size: 28px;
    color: var(--magenta);
    text-shadow: 0 0 10px rgba(255,0,102,0.3);
  }
  .stat-value.dim { color: var(--white-dim); text-shadow: none; }

  /* Entries list */
  .entries {
    padding: 20px 40px 60px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .entry {
    background: rgba(255,0,102,0.03);
    border: 1px solid rgba(255,0,102,0.1);
    padding: 16px 20px;
    transition: border-color 0.2s;
    cursor: pointer;
  }
  .entry:hover { border-color: rgba(255,0,102,0.35); }
  .entry-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 10px;
  }
  .entry-query {
    font-family: 'VT323', monospace;
    font-size: 22px;
    color: #fff;
    line-height: 1.3;
    flex: 1;
  }
  .entry-time {
    font-size: 11px;
    color: var(--white-faint);
    white-space: nowrap;
    letter-spacing: 1px;
  }
  .entry-meta {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    align-items: center;
    margin-bottom: 10px;
  }
  .tag {
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 2px 8px;
    border: 1px solid;
  }
  .tag-scenario { border-color: rgba(255,0,102,0.3); color: var(--magenta); }
  .tag-tokens { border-color: rgba(255,255,255,0.1); color: var(--white-dim); }
  .tag-score { border-color: rgba(255,255,255,0.1); }
  .tag-score.good { border-color: rgba(0,255,100,0.3); color: #00ff66; }
  .tag-score.mid { border-color: rgba(255,200,0,0.3); color: #ffc800; }
  .tag-score.low { border-color: rgba(255,0,0,0.3); color: #ff4444; }

  .entry-explanation {
    font-size: 13px;
    color: var(--white-faint);
    line-height: 1.6;
    margin-bottom: 8px;
  }

  /* Shock pills */
  .shocks { display: flex; flex-wrap: wrap; gap: 6px; }
  .shock-pill {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    padding: 2px 8px;
    background: rgba(255,0,102,0.1);
    border: 1px solid rgba(255,0,102,0.25);
    color: var(--magenta);
    letter-spacing: 1px;
  }

  /* Learned section */
  .learned {
    margin-top: 10px;
    padding: 10px 14px;
    background: rgba(255,255,255,0.02);
    border-left: 2px solid rgba(255,0,102,0.2);
  }
  .learned-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--magenta);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .learned-text {
    font-size: 12px;
    color: var(--white-faint);
    line-height: 1.6;
  }
  .learned-comparison {
    display: flex;
    gap: 20px;
    margin-top: 8px;
    flex-wrap: wrap;
  }
  .learned-col {
    flex: 1;
    min-width: 200px;
  }
  .learned-col-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .mentor-col .learned-col-title { color: var(--magenta); }
  .protege-col .learned-col-title { color: rgba(0,200,255,0.7); }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 80px 40px;
  }
  .empty-icon {
    font-family: 'VT323', monospace;
    font-size: 48px;
    color: rgba(255,0,102,0.2);
    margin-bottom: 16px;
  }
  .empty-text {
    font-size: 14px;
    color: var(--white-faint);
    letter-spacing: 2px;
  }

  /* Loading */
  .loading {
    text-align: center;
    padding: 80px 40px;
  }
  .loading-text {
    font-family: 'VT323', monospace;
    font-size: 24px;
    color: var(--magenta);
    animation: pulse 1.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  /* Status bar */
  .status-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 28px;
    background: rgba(10,0,8,0.95);
    border-top: 1px solid rgba(255,0,102,0.15);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 20px;
    font-size: 10px;
    color: var(--white-faint);
    letter-spacing: 2px;
    z-index: 100;
  }
  .status-live { color: var(--magenta); text-shadow: 0 0 6px rgba(255,0,102,0.4); }

  /* Entry expanded */
  .entry-detail { display: none; }
  .entry.expanded .entry-detail { display: block; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
const AUGUR_API = "https://augur.saipien.net";

function App() {
  const [entries, setEntries] = React.useState([]);
  const [stats, setStats] = React.useState(null);
  const [mlStats, setMlStats] = React.useState(null);
  const [loading, setLoading] = React.useState(true);
  const [error, setError] = React.useState(null);
  const [expanded, setExpanded] = React.useState(null);

  React.useEffect(() => {
    async function load() {
      try {
        const [entriesRes, statsRes, mlRes] = await Promise.all([
          fetch(`${AUGUR_API}/augur/ledger/entries`).then(r => r.json()),
          fetch(`${AUGUR_API}/augur/ledger/stats`).then(r => r.json()),
          fetch(`${AUGUR_API}/augur/ml/stats`).then(r => r.json()),
        ]);
        setEntries(entriesRes.entries || []);
        setStats(statsRes);
        setMlStats(mlRes);
      } catch (e) {
        setError("Backend offline — waiting for cold start...");
        // Retry once after 60s for Render cold start
        setTimeout(async () => {
          try {
            const [entriesRes, statsRes, mlRes] = await Promise.all([
              fetch(`${AUGUR_API}/augur/ledger/entries`).then(r => r.json()),
              fetch(`${AUGUR_API}/augur/ledger/stats`).then(r => r.json()),
              fetch(`${AUGUR_API}/augur/ml/stats`).then(r => r.json()),
            ]);
            setEntries(entriesRes.entries || []);
            setStats(statsRes);
            setMlStats(mlRes);
            setError(null);
          } catch (e2) {
            setError("Backend unreachable. Try again later.");
          }
        }, 60000);
      } finally {
        setLoading(false);
      }
    }
    load();
  }, []);

  const totalMentorTokens = stats?.total_mentor_tokens || 0;
  const totalProtegeTokens = stats?.total_protege_tokens || 0;

  function formatTime(ts) {
    if (!ts) return "—";
    const d = new Date(ts);
    return d.toLocaleDateString("en-US", { month: "short", day: "numeric" }) + " " +
           d.toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit", hour12: false });
  }

  function scoreClass(score) {
    if (score >= 0.8) return "good";
    if (score >= 0.5) return "mid";
    return "low";
  }

  function getLearnings(entry) {
    const learnings = [];
    // What nodes the mentor identified
    if (entry.shocks && entry.shocks.length > 0) {
      learnings.push(`Identified ${entry.shocks.length} shock node${entry.shocks.length > 1 ? "s" : ""} in the knowledge graph`);
    }
    // Scenario type mapping
    if (entry.scenario_type && entry.scenario_type !== "unknown") {
      learnings.push(`Classified as ${entry.scenario_type.replace("_", " ")} scenario`);
    }
    // Protege comparison
    if (entry.protege_score > 0) {
      const mentorShocks = new Set((entry.shocks || []).map(s => s.nodeId || s.node));
      const protegeShocks = new Set((entry.protege_shocks || []).map(s => s.nodeId || s.node));
      const overlap = [...mentorShocks].filter(n => protegeShocks.has(n));
      const mentorOnly = [...mentorShocks].filter(n => !protegeShocks.has(n));
      const protegeOnly = [...protegeShocks].filter(n => !mentorShocks.has(n));
      if (overlap.length > 0) learnings.push(`Protege agreed on ${overlap.length} node${overlap.length > 1 ? "s" : ""}: ${overlap.join(", ")}`);
      if (mentorOnly.length > 0) learnings.push(`Mentor found nodes protege missed: ${mentorOnly.join(", ")}`);
      if (protegeOnly.length > 0) learnings.push(`Protege identified extra nodes: ${protegeOnly.join(", ")}`);
    }
    return learnings;
  }

  return (
    <div>
      {/* Header */}
      <div className="header">
        <div className="header-left">
          <span className="logo">AUGUR</span>
          <span className="subtitle">Learning Ledger</span>
        </div>
        <a href="/" className="back-link">&larr; CASCADE ENGINE</a>
      </div>

      {/* Stats bar */}
      <div className="stats-bar">
        <div className="stat">
          <span className="stat-label">Queries</span>
          <span className="stat-value">{stats?.total_examples ?? "—"}</span>
        </div>
        <div className="stat">
          <span className="stat-label">Mentor Tokens</span>
          <span className="stat-value">{totalMentorTokens > 0 ? totalMentorTokens.toLocaleString() : "—"}</span>
        </div>
        <div className="stat">
          <span className="stat-label">Protege Tokens</span>
          <span className="stat-value dim">{totalProtegeTokens > 0 ? totalProtegeTokens.toLocaleString() : "—"}</span>
        </div>
        <div className="stat">
          <span className="stat-label">Protege Accuracy</span>
          <span className="stat-value" style={{ color: stats?.average_protege_score >= 0.8 ? "#00ff66" : stats?.average_protege_score >= 0.5 ? "#ffc800" : "var(--magenta)" }}>
            {stats ? (stats.average_protege_score * 100).toFixed(1) + "%" : "—"}
          </span>
        </div>
        <div className="stat">
          <span className="stat-label">Mode</span>
          <span className="stat-value" style={{ fontSize: 20 }}>{(stats?.mode || "—").toUpperCase()}</span>
        </div>
        <div className="stat">
          <span className="stat-label">SCM Trained</span>
          <span className="stat-value dim" style={{ fontSize: 20 }}>{mlStats?.scm?.trained ? "YES" : "NO"}</span>
        </div>
        <div className="stat">
          <span className="stat-label">GNN Generation</span>
          <span className="stat-value dim" style={{ fontSize: 20 }}>{mlStats?.gnn?.generation ?? "—"}</span>
        </div>
        <div className="stat">
          <span className="stat-label">Conformal Calibrated</span>
          <span className="stat-value dim" style={{ fontSize: 20 }}>{mlStats?.conformal?.calibrated ? "YES" : "NO"}</span>
        </div>
      </div>

      {/* Entries */}
      <div className="entries">
        {loading && (
          <div className="loading">
            <div className="loading-text">LOADING LEDGER...</div>
          </div>
        )}

        {error && !loading && (
          <div className="empty">
            <div className="empty-icon">&#x26A0;</div>
            <div className="empty-text">{error}</div>
          </div>
        )}

        {!loading && !error && entries.length === 0 && (
          <div className="empty">
            <div className="empty-icon">&#x2205;</div>
            <div className="empty-text">NO ENTRIES YET — RUN A QUERY IN THE CASCADE ENGINE</div>
          </div>
        )}

        {[...entries].reverse().map((entry, i) => {
          const idx = entries.length - 1 - i;
          const isExpanded = expanded === idx;
          const mentorTok = entry.mentor_tokens?.total_tokens || 0;
          const protegeTok = entry.protege_tokens?.total_tokens || 0;
          const learnings = getLearnings(entry);

          return (
            <div key={idx} className={`entry${isExpanded ? " expanded" : ""}`} onClick={() => setExpanded(isExpanded ? null : idx)}>
              <div className="entry-header">
                <div className="entry-query">{entry.query}</div>
                <div className="entry-time">{formatTime(entry.timestamp)}</div>
              </div>

              <div className="entry-meta">
                {entry.scenario_type && entry.scenario_type !== "unknown" && (
                  <span className="tag tag-scenario">{entry.scenario_type.replace("_", " ")}</span>
                )}
                {mentorTok > 0 && (
                  <span className="tag tag-tokens">MENTOR: {mentorTok.toLocaleString()} tok</span>
                )}
                {protegeTok > 0 && (
                  <span className="tag tag-tokens">PROTEGE: {protegeTok.toLocaleString()} tok</span>
                )}
                {entry.confidence > 0 && (
                  <span className="tag tag-tokens">CONF: {(entry.confidence * 100).toFixed(0)}%</span>
                )}
                {entry.protege_score > 0 && (
                  <span className={`tag tag-score ${scoreClass(entry.protege_score)}`}>
                    SCORE: {(entry.protege_score * 100).toFixed(0)}%
                  </span>
                )}
              </div>

              {/* Shocks */}
              <div className="shocks">
                {(entry.shocks || []).map((s, j) => (
                  <span key={j} className="shock-pill">
                    {(s.nodeId || s.node || "?").toUpperCase()}
                    {s.magnitude != null && ` ${s.magnitude > 0 ? "+" : ""}${(s.magnitude * 100).toFixed(0)}%`}
                  </span>
                ))}
              </div>

              {/* Expanded: What Augur Learned */}
              <div className="entry-detail">
                {entry.explanation && (
                  <div className="entry-explanation" style={{ marginTop: 12 }}>
                    {entry.explanation}
                  </div>
                )}

                <div className="learned">
                  <div className="learned-title">What Augur Learned</div>
                  {learnings.length > 0 ? (
                    <div className="learned-text">
                      {learnings.map((l, k) => (
                        <div key={k} style={{ marginBottom: 3 }}>&#x25B8; {l}</div>
                      ))}
                    </div>
                  ) : (
                    <div className="learned-text">First query — baseline established. No protege comparison yet.</div>
                  )}

                  {entry.protege_shocks && entry.protege_shocks.length > 0 && (
                    <div className="learned-comparison">
                      <div className="learned-col mentor-col">
                        <div className="learned-col-title">Mentor Shocks</div>
                        <div className="shocks">
                          {(entry.shocks || []).map((s, j) => (
                            <span key={j} className="shock-pill">{(s.nodeId || s.node || "?").toUpperCase()}</span>
                          ))}
                        </div>
                      </div>
                      <div className="learned-col protege-col">
                        <div className="learned-col-title">Protege Shocks</div>
                        <div className="shocks">
                          {entry.protege_shocks.map((s, j) => (
                            <span key={j} className="shock-pill" style={{ background: "rgba(0,200,255,0.08)", borderColor: "rgba(0,200,255,0.25)", color: "rgba(0,200,255,0.8)" }}>
                              {(s.nodeId || s.node || "?").toUpperCase()}
                            </span>
                          ))}
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              </div>
            </div>
          );
        })}
      </div>

      {/* Status bar */}
      <div className="status-bar">
        <span>AUGUR LEARNING LEDGER // TEACHING LOG</span>
        <span className={stats ? "status-live" : ""}>
          {stats ? "● CONNECTED" : "○ OFFLINE"}
        </span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
