// ── AUTH GATE ──
(function(){
  const HASH='3654dd087e3cc1d131fe05c29d413be06970a08190c182366a9199642d03527d';
  async function sha256(str){
    const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }
  const gate=document.getElementById('auth-gate');
  const app=document.getElementById('root');
  const pw=document.getElementById('auth-pw');
  const btn=document.getElementById('auth-btn');
  const err=document.getElementById('auth-err');

  if(sessionStorage.getItem('augur-auth')==='1'){
    gate.classList.add('hidden');app.style.display='';
  }

  async function tryAuth(){
    const h=await sha256(pw.value);
    if(h===HASH){
      sessionStorage.setItem('augur-auth','1');
      gate.classList.add('hidden');app.style.display='';
    }else{
      err.textContent='ACCESS DENIED — Invalid credentials';
      pw.value='';pw.focus();
      setTimeout(()=>{err.textContent='';},3000);
    }
  }
  btn.addEventListener('click',tryAuth);
  pw.addEventListener('keydown',function(e){if(e.key==='Enter')tryAuth();});
})();
</script>

    for (const e of EDGES.filter(x => x.source === cur)) {
      const p = ci * e.weight; if (Math.abs(p) < 0.01) continue;
      if (Math.abs(p) > Math.abs(impacts.get(e.target) || 0)) {
        impacts.set(e.target, p); paths.set(e.target, [...(paths.get(cur)||[]), { node: e.target, impact: p, edge: e.label }]);
        queue.push(e.target); visited.delete(e.target);
      }
    }
  }
  return { impacts, paths };
}

function matchScenario(q) {
  const l = q.toLowerCase(); let best = null, bs = 0;
  for (const s of SCENARIOS) { const sc = s.trigger.reduce((a,k) => a + (l.includes(k)?1:0), 0); if (sc > bs) { bs = sc; best = s; } }
  if (bs >= 1) return best;
  const nm = NODES.find(n => l.includes(n.label.toLowerCase()) || l.includes(n.id.replace(/_/g," ")));
  return nm ? { shocks: [{ nodeId: nm.id, magnitude: -0.30, label: nm.label.toUpperCase() + " DISRUPTED" }] } : null;
}

// ── LLM QUERY PARSER (calls backend, falls back to local) ──

async function parseQueryLLM(q) {
  try {
    const r = await fetch(AUGUR_API + "/augur/parse", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ query: q }),
    });
    if (!r.ok) throw new Error("API " + r.status);
    const data = await r.json();
    // Map backend response to frontend shock format
    const shocks = data.shocks.map(s => {
      // Find closest node in graph
      const nodeId = s.node.toLowerCase().replace(/\s+/g, "_");
      const node = NODES.find(n => n.id === nodeId || n.id === s.node);
      return {
        nodeId: node ? node.id : nodeId,
        magnitude: s.magnitude,
        label: (s.reasoning || s.node).toUpperCase(),
      };
    }).filter(s => NODES.some(n => n.id === s.nodeId)); // Only keep valid nodes
    return {
      shocks,
      source: data.source,
      explanation: data.explanation,
      confidence: data.confidence,
      llm: true,
    };
  } catch (e) {
    console.log("[AUGUR] Backend unavailable, using local matching:", e.message);
    return null; // Fallback to local
  }
}

// ── GRAPH ──

function GraphVis({ impacts, shocks, onNodeClick }) {
  const ref = useRef(null);

  useEffect(() => {
    if (!ref.current) return;
    const svg = d3.select(ref.current); svg.selectAll("*").remove();
    const w = ref.current.clientWidth, h = ref.current.clientHeight;
    const g = svg.append("g");
    svg.call(d3.zoom().scaleExtent([0.2, 5]).on("zoom", ev => g.attr("transform", ev.transform)));

    const defs = svg.append("defs");
    // Magenta arrow
    defs.append("marker").attr("id", "arr").attr("viewBox", "0 -4 8 8")
      .attr("refX", 22).attr("markerWidth", 5).attr("markerHeight", 5).attr("orient", "auto")
      .append("path").attr("d", "M0,-3L8,0L0,3").attr("fill", "rgba(255,0,102,0.3)");
    // Hot arrow
    defs.append("marker").attr("id", "arr-hot").attr("viewBox", "0 -4 8 8")
      .attr("refX", 22).attr("markerWidth", 6).attr("markerHeight", 6).attr("orient", "auto")
      .append("path").attr("d", "M0,-3L8,0L0,3").attr("fill", "#ff0066");

    // Glow
    const gl = defs.append("filter").attr("id", "gl").attr("x", "-50%").attr("y", "-50%").attr("width", "200%").attr("height", "200%");
    gl.append("feGaussianBlur").attr("stdDeviation", "5").attr("result", "b");
    gl.append("feFlood").attr("flood-color", "#ff0066").attr("flood-opacity", "0.6").attr("result", "c");
    gl.append("feComposite").attr("in", "c").attr("in2", "b").attr("operator", "in").attr("result", "g");
    const m = gl.append("feMerge"); m.append("feMergeNode").attr("in", "g"); m.append("feMergeNode").attr("in", "SourceGraphic");

    // White glow for resting
    const glw = defs.append("filter").attr("id", "glw").attr("x", "-50%").attr("y", "-50%").attr("width", "200%").attr("height", "200%");
    glw.append("feGaussianBlur").attr("stdDeviation", "3").attr("result", "b");
    glw.append("feFlood").attr("flood-color", "#ffffff").attr("flood-opacity", "0.15").attr("result", "c");
    glw.append("feComposite").attr("in", "c").attr("in2", "b").attr("operator", "in").attr("result", "g");
    const mw = glw.append("feMerge"); mw.append("feMergeNode").attr("in", "g"); mw.append("feMergeNode").attr("in", "SourceGraphic");

    const sn = NODES.map(n => ({ ...n })), se = EDGES.map(e => ({ ...e }));
    const sim = d3.forceSimulation(sn)
      .force("link", d3.forceLink(se).id(d => d.id).distance(125).strength(0.35))
      .force("charge", d3.forceManyBody().strength(-300))
      .force("center", d3.forceCenter(w / 2, h / 2))
      .force("collision", d3.forceCollide().radius(30));

    // Edges — circuit traces
    const link = g.append("g").selectAll("line").data(se).join("line")
      .attr("stroke", d => {
        if (!impacts) return "rgba(255,0,102,0.04)";
        const ti = impacts.get(typeof d.target === "object" ? d.target.id : d.target);
        const si = impacts.get(typeof d.source === "object" ? d.source.id : d.source);
        if (si && ti) return Math.abs(ti) > 0.1 ? "#ff0066" : "rgba(255,255,255,0.4)";
        return "rgba(255,0,102,0.03)";
      })
      .attr("stroke-width", d => {
        if (!impacts) return 0.6;
        const ti = impacts.get(typeof d.target === "object" ? d.target.id : d.target);
        return ti ? Math.min(Math.abs(ti) * 6 + 1, 3) : 0.4;
      })
      .attr("marker-end", d => {
        if (!impacts) return "url(#arr)";
        const ti = impacts.get(typeof d.target === "object" ? d.target.id : d.target);
        return (ti && Math.abs(ti) > 0.1) ? "url(#arr-hot)" : "url(#arr)";
      })
      .style("stroke-dasharray", d => {
        if (!impacts) return "2 6";
        const ti = impacts.get(typeof d.target === "object" ? d.target.id : d.target);
        return (ti && Math.abs(ti) > 0.05) ? "none" : "2 6";
      });

    const node = g.append("g").selectAll("g").data(sn).join("g")
      .style("cursor", "pointer")
      .call(d3.drag()
        .on("start", (ev, d) => { if (!ev.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
        .on("drag", (ev, d) => { d.fx = ev.x; d.fy = ev.y; })
        .on("end", (ev, d) => { if (!ev.active) sim.alphaTarget(0); d.fx = null; d.fy = null; })
      )
      .on("click", (ev, d) => onNodeClick && onNodeClick(d));

    // Shock ring
    node.append("circle")
      .attr("r", d => {
        if (shocks && shocks.find(s => s.nodeId === d.id)) return 20;
        if (impacts && Math.abs(impacts.get(d.id) || 0) > 0.1) return 16;
        return 0;
      })
      .attr("fill", "none")
      .attr("stroke", "#ff0066")
      .attr("stroke-width", d => (shocks && shocks.find(s => s.nodeId === d.id)) ? 1.5 : 0.8)
      .attr("stroke-dasharray", "3 3")
      .style("animation", "shockRing 1.5s ease infinite");

    // Main dot — white at rest, magenta when hit
    node.append("circle")
      .attr("r", d => {
        if (!impacts) return 6;
        const imp = impacts.get(d.id);
        return imp ? Math.min(Math.abs(imp) * 18 + 7, 16) : 5;
      })
      .attr("fill", d => {
        if (shocks && shocks.find(s => s.nodeId === d.id)) return "#ff0066";
        if (impacts && impacts.get(d.id)) return Math.abs(impacts.get(d.id)) > 0.1 ? "#ff0066" : "#ffffff";
        return "#ffffff";
      })
      .attr("fill-opacity", d => (!impacts) ? 0.25 : (impacts.get(d.id) ? 0.9 : 0.08))
      .style("filter", d => {
        if (shocks && shocks.find(s => s.nodeId === d.id)) return "url(#gl)";
        if (impacts && Math.abs(impacts.get(d.id) || 0) > 0.1) return "url(#gl)";
        if (impacts && impacts.get(d.id)) return "url(#glw)";
        return "none";
      });

    // Labels — white, uppercase
    node.append("text")
      .text(d => d.label.toUpperCase())
      .attr("dy", d => (impacts && Math.abs(impacts.get(d.id)||0) > 0.1 ? 26 : 18) + "px")
      .attr("text-anchor", "middle")
      .attr("fill", d => {
        if (!impacts) return "rgba(255,255,255,0.4)";
        if (impacts.get(d.id)) return Math.abs(impacts.get(d.id)) > 0.1 ? "#ff0066" : "rgba(255,255,255,0.6)";
        return "rgba(255,255,255,0.4)";
      })
      .attr("font-size", "9px")
      .attr("font-family", "'Share Tech Mono', monospace")
      .attr("letter-spacing", "2px")
      .style("text-shadow", d => {
        if (impacts && Math.abs(impacts.get(d.id)||0) > 0.1) return "0 0 10px rgba(255,0,102,0.6), 2px 0 0 rgba(255,0,102,0.2), -2px 0 0 rgba(0,255,255,0.1)";
        return "none";
      });

    sim.on("tick", () => {
      link.attr("x1", d => d.source.x).attr("y1", d => d.source.y).attr("x2", d => d.target.x).attr("y2", d => d.target.y);
      node.attr("transform", d => "translate(" + d.x + "," + d.y + ")");
    });

    setTimeout(() => svg.call(d3.zoom().scaleExtent([0.2,5]).on("zoom", ev => g.attr("transform", ev.transform)).transform, d3.zoomIdentity.scale(0.75).translate(w*0.16, h*0.16)), 800);
    return () => sim.stop();
  }, [impacts, shocks]);

  return <svg ref={ref} style={{ width: "100%", height: "100%", background: "transparent" }} />;
}

      </div>

}

function CascadePath({ path }) {
  if (!path || path.length < 2) return null;
  return (
    <div style={{ padding: "8px 10px", background: "rgba(255,0,102,0.04)", border: "1px solid rgba(255,0,102,0.1)", marginTop: 8 }}>

          const nd = NODES.find(n => n.id === step.node);
          return (
            <span key={i} style={{ display: "inline-flex", alignItems: "center", gap: 3 }}>
              {i > 0 && <span className="vt" style={{ color: "#ff0066", fontSize: 15 }}>{"\u25B8"}</span>}

                background: i === 0 ? "rgba(255,0,102,0.15)" : "rgba(255,255,255,0.05)",

            </span>
          );
        })}
      </div>
    </div>
  );
}

  // BOOT SEQUENCE — HCF style
  useEffect(() => {
    setTimeout(() => setPhase(1), 2200);  // glitch transition
    setTimeout(() => setPhase(2), 3200);  // app reveals
  }, []);

  const runQuery = useCallback(async (q) => {
    const input = q || query;
    setLoading(true); setShowHelp(false); setSelNode(null);

    // Try LLM backend first
    const llmResult = await parseQueryLLM(input);

    if (llmResult && llmResult.shocks.length > 0) {
      // LLM successfully parsed — run cascade with its shocks
      const r = propagateCascade(llmResult.shocks);
      setResult({ ...r, shocks: llmResult.shocks, explanation: llmResult.explanation, confidence: llmResult.confidence });
      setLlmSource(llmResult.source || "llm");
    } else {
      // Fallback to local keyword matching
      const sc = matchScenario(input);
      if (!sc) { setResult({ error: true }); setLoading(false); return; }
      const r = propagateCascade(sc.shocks);
      setResult({ ...r, shocks: sc.shocks });

    arr.sort((a, b) => Math.abs(b.impact) - Math.abs(a.impact));

              <div className="data-text" style={{ fontSize: 12, color: "rgba(255,255,255,0.4)", marginBottom: 18, letterSpacing: "1px", lineHeight: 1.6 }}>
                TYPE A SCENARIO OR SELECT BELOW. AUGUR WILL PROPAGATE THE SHOCK THROUGH THE DEPENDENCY GRAPH.
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
                {examples.map((eq, i) => (
                  <button key={i} onClick={() => { setQuery(eq); runQuery(eq); }}
                    style={{
                      padding: "8px 12px", background: "transparent", border: "1px solid rgba(255,255,255,0.4)",
                      color: "rgba(255,255,255,0.4)", fontSize: 18, cursor: "pointer", textAlign: "left",
                      fontFamily: "'VT323', monospace", letterSpacing: "0.5px", transition: "all 0.15s",
                    }}
                    onMouseEnter={e => { e.target.style.borderColor = "rgba(255,0,102,0.3)"; e.target.style.color = "#ffffff"; e.target.style.background = "rgba(255,0,102,0.06)"; e.target.style.textShadow = "0 0 8px rgba(255,0,102,0.3)"; }}
                    onMouseLeave={e => { e.target.style.borderColor = "rgba(255,255,255,0.4)"; e.target.style.color = "rgba(255,255,255,0.4)"; e.target.style.background = "transparent"; e.target.style.textShadow = "none"; }}
                  >
                    <span style={{ color: "#ff0066", marginRight: 8 }}>&gt;</span>{eq}
                  </button>
                ))}
              </div>
            </div>
          )}

          {loading && (
            <div className="vt" style={{ position: "absolute", bottom: 24, left: "50%", transform: "translateX(-50%)", background: "rgba(255,0,102,0.08)", padding: "8px 20px", fontSize: 18, color: "#ff0066", border: "1px solid rgba(255,0,102,0.2)", letterSpacing: "2px", animation: "pulse 1s ease infinite" }}>
              PARSING QUERY...
            </div>
          )}

          {result && result.error && !loading && (
            <div className="vt" style={{ position: "absolute", bottom: 24, left: "50%", transform: "translateX(-50%)", background: "rgba(255,0,102,0.08)", padding: "8px 20px", fontSize: 18, color: "#ff0066", border: "1px solid rgba(255,0,102,0.2)", letterSpacing: "2px" }}>
              NO MATCHING SCENARIO
            </div>
          )}

          {selNode && (
            <div style={{ position: "absolute", bottom: 24, left: 24, background: "rgba(10,0,8,0.96)", border: "1px solid rgba(255,0,102,0.1)", padding: 16, maxWidth: 340, animation: "fadeIn 0.2s ease" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <span className="vt" style={{ fontSize: 22, color: "#ffffff", letterSpacing: "2px", textShadow: "0 0 6px rgba(255,0,102,0.3)" }}>{selNode.label.toUpperCase()}</span>
                <button onClick={() => setSelNode(null)} style={{ background: "none", border: "none", color: "rgba(255,255,255,0.4)", cursor: "pointer", fontSize: 20, fontFamily: "monospace" }}>&times;</button>
              </div>
              <div className="data-text" style={{ fontSize: 12, color: "rgba(255,255,255,0.4)", marginTop: 4 }}>{selNode.desc}</div>
              <div className="label" style={{ marginTop: 6, fontSize: 10, color: "rgba(255,255,255,0.4)" }}>{selNode.domain} // {selNode.type}</div>
              {result && result.impacts && result.impacts.get(selNode.id) && (
                <div style={{ marginTop: 8, padding: "6px 10px", background: "rgba(255,0,102,0.06)", border: "1px solid rgba(255,0,102,0.15)" }}>
                  <span className="data-text" style={{ color: "#ff0066", fontWeight: 700, textShadow: "0 0 8px rgba(255,0,102,0.4)" }}>
                    IMPACT: {(result.impacts.get(selNode.id) * 100).toFixed(1)}%
                  </span>
                </div>
              )}
              {result && result.paths && result.paths.get(selNode.id) && <CascadePath path={result.paths.get(selNode.id)} />}
            </div>
          )}
        </div>

        {/* IMPACT PANEL */}
        {result && !result.error && (
          <div style={{ width: 370, borderLeft: "1px solid rgba(255,0,102,0.08)", overflow: "auto", padding: 20, animation: "fadeIn 0.3s ease", flexShrink: 0, background: "var(--panel)" }}>
            <div style={{ marginBottom: 20 }}>
              <div className="label" style={{ marginBottom: 10, letterSpacing: "4px", fontSize: 11, color: "rgba(255,255,255,0.4)" }}>SHOCK EVENT</div>
              {result.shocks.map((s, i) => (
                <div key={i} style={{ padding: "14px", background: "rgba(255,0,102,0.06)", border: "1px solid rgba(255,0,102,0.15)", marginBottom: 6 }}>
                  <div className="data-text" style={{ color: "rgba(255,255,255,0.6)", fontSize: 14, letterSpacing: "1px" }}>{s.label}</div>
                  <div className="vt" style={{
                    color: "#ff0066", fontSize: 42, marginTop: 4,
                    textShadow: "0 0 15px rgba(255,0,102,0.5), 0 0 30px rgba(255,0,102,0.3), 3px 0 0 rgba(255,0,102,0.15)",
                  }}>
                    {(s.magnitude * 100).toFixed(0)}%
                  </div>
                </div>
              ))}
            </div>

            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 14 }}>
              <div className="label" style={{ letterSpacing: "3px", fontSize: 11 }}>CASCADING IMPACTS</div>
              <div style={{ flex: 1, height: 1, background: "rgba(255,0,102,0.08)" }} />
              <span className="data-text" style={{ fontSize: 11, color: "rgba(255,255,255,0.4)" }}>{sorted.length}</span>
            </div>

            {sorted.map((item, i) => (
              <div key={item.id} style={{ cursor: "pointer", padding: "2px 4px", transition: "background 0.15s" }}
                onClick={() => setSelNode(NODES.find(n => n.id === item.id))}
                onMouseEnter={e => e.currentTarget.style.background = "rgba(255,0,102,0.03)"}
                onMouseLeave={e => e.currentTarget.style.background = "transparent"}>
                <ImpactBar label={item.label} impact={item.impact} desc={item.desc} delay={i * 50} />
              </div>
            ))}

            <div style={{ marginTop: 20, padding: 14, background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.08)" }}>
              <div className="label" style={{ marginBottom: 8, letterSpacing: "3px", fontSize: 11 }}>ANALYSIS</div>
              <div className="data-text" style={{ fontSize: 12, color: "rgba(255,255,255,0.4)", lineHeight: 1.7 }}>
                {result.explanation && (
                  <div style={{ marginBottom: 8, color: "rgba(255,255,255,0.4)", fontStyle: "italic" }}>
                    {result.explanation}
                  </div>
                )}
                {sorted.length > 0 && (
                  <span>
                    PRIMARY TARGET: <span style={{ color: "#ff0066", textShadow: "0 0 6px rgba(255,0,102,0.3)" }}>{sorted[0].label.toUpperCase()}</span> AT <span style={{ color: "#ff0066" }}>{(sorted[0].impact * 100).toFixed(1)}%</span>.
                    {sorted.filter(s => Math.abs(s.impact) > 0.1).length > 1 && (" " + sorted.filter(s => Math.abs(s.impact) > 0.1).length + " ENTITIES >10% DISRUPTION.")}
                    {" "}SELECT NODE FOR CASCADE PATH.
                  </span>
                )}
                {result.confidence && (
                  <div style={{ marginTop: 8 }}>
                    <span className="label" style={{ fontSize: 9 }}>CONFIDENCE</span>
                    <span style={{ color: "#ff0066", marginLeft: 6 }}>{(result.confidence * 100).toFixed(0)}%</span>
                  </div>
                )}
              </div>
            </div>
          </div>
        )}
      </div>

      {/* BOTTOM */}
      <div style={{ padding: "5px 24px", borderTop: "1px solid rgba(255,0,102,0.06)", display: "flex", justifyContent: "space-between", alignItems: "center", flexShrink: 0 }}>
        <div style={{ display: "flex", gap: 14, alignItems: "center" }}>
          <div style={{ width: 4, height: 4, background: "#ff0066", boxShadow: "0 0 4px #ff0066", animation: "pulse 2s ease infinite" }} />
          <span className="label" style={{ fontSize: 9, color: "rgba(255,255,255,0.4)" }}>CASCADE ENGINE ONLINE</span>
          <span style={{ color: "rgba(255,255,255,0.4)", fontSize: 10 }}>|</span>
          <span className="label" style={{ fontSize: 9, color: "rgba(255,255,255,0.4)" }}>BAYESIAN PROPAGATION</span>
          {llmSource && (
            <>
              <span style={{ color: "rgba(255,255,255,0.4)", fontSize: 10 }}>|</span>
              <span className="label" style={{
                fontSize: 9,
                color: llmSource === "local" ? "rgba(255,255,255,0.4)" : "#ff0066",
                textShadow: llmSource !== "local" ? "0 0 4px rgba(255,0,102,0.3)" : "none",
              }}>
                {llmSource === "shadow-mentor" ? "MENTOR // SHADOW" : llmSource === "protege" ? "PROTEGE // INDEPENDENT" : llmSource === "mentor" ? "MENTOR // DIRECT" : llmSource === "mentor-fallback" ? "MENTOR // FALLBACK" : "LOCAL // OFFLINE"}
              </span>
            </>
          )}
        </div>
        <span className="vt" style={{ fontSize: 15, color: "rgba(255,255,255,0.4)", letterSpacing: "3px" }}>SAIPIEN.NET</span>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Augur />);
</script>
</body>
</html>
